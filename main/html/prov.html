<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ESP32-Vibe-RGB йЕНзљС</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div style="max-width:420px;margin:0 auto;padding:16px">
  <div class="header">ESP32-Vibe-RGB йЕНзљС</div>

  <div class="card">
    <h3>йАЙжЛ© WiFi</h3>
    <div id="ap-list" class="ap-list"><div class="scanning">зВєеЗїдЄЛжЦєжМЙйТЃжЙЂжПП...</div></div>
    <div class="btn-row" style="margin-top:10px">
      <button class="btn" onclick="scanWifi()">рЯФН жЙЂжПП WiFi</button>
    </div>
  </div>

  <div class="card">
    <h3>WiFi еЗ≠жНЃ</h3>
    <div class="field">
      <label>WiFi еРНзІ∞ (SSID)</label>
      <input type="text" id="ssid" placeholder="иЊУеЕ•жИЦзВєеЗїдЄКжЦєеИЧи°®йАЙжЛ©" autocomplete="off">
    </div>
    <div class="field">
      <label>WiFi еѓЖз†Б</label>
      <input type="password" id="pass" placeholder="жЧ†еѓЖз†БзХЩз©Ї" autocomplete="new-password">
    </div>
  </div>

  <div class="card">
    <h3>IP йЕНзљЃ</h3>
    <div class="field">
      <label>IP еИЖйЕНжЦєеЉП</label>
      <select id="ip_mode" onchange="toggleStaticIP()">
        <option value="0">DHCPпЉИиЗ™еК®иОЈеПЦпЉЙ</option>
        <option value="1">йЭЩжАБ IP</option>
      </select>
    </div>
    <div id="static-ip-fields">
      <div class="field"><label>IP еЬ∞еЭА</label><input type="text" id="s_ip" placeholder="192.168.1.100"></div>
      <div class="field"><label>е≠РзљСжО©з†Б</label><input type="text" id="s_mask" placeholder="255.255.255.0"></div>
      <div class="field"><label>зљСеЕ≥</label><input type="text" id="s_gw" placeholder="192.168.1.1"></div>
      <div class="field"><label>DNS дЄї</label><input type="text" id="s_dns1" placeholder="8.8.8.8"></div>
      <div class="field"><label>DNS е§З</label><input type="text" id="s_dns2" placeholder="8.8.4.4"></div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn primary" style="flex:1" onclick="doProvision()">ињЮжО•еєґдњЭе≠Ш</button>
  </div>
  <div id="msg" style="text-align:center;margin-top:12px;font-size:.88rem;min-height:20px"></div>
</div>

<script>
function toggleStaticIP(){
  document.getElementById('static-ip-fields').className =
    document.getElementById('ip_mode').value==='1'?'show':'';
}

function scanWifi(){
  var el=document.getElementById('ap-list');
  el.innerHTML='<div class="scanning">жЙЂжППдЄ≠пЉМиѓЈз®НеАЩ...</div>';
  fetch('/api/scan').then(r=>r.json()).then(aps=>{
    if(!aps.length){el.innerHTML='<div class="scanning">жЬ™жЙЊеИ∞зГ≠зВє</div>';return;}
    el.innerHTML='';
    aps.sort((a,b)=>b.rssi-a.rssi);
    aps.forEach(ap=>{
      var d=document.createElement('div');
      d.className='ap-item';
      var icon=ap.auth===0?'рЯФУ':'рЯФТ';
      var bars=ap.rssi>-50?'вЦВвЦДвЦЖвЦИ':ap.rssi>-65?'вЦВвЦДвЦЖ_':ap.rssi>-75?'вЦВвЦД__':'вЦВ___';
      d.innerHTML='<span>'+icon+' '+escHtml(ap.ssid)+'</span>'
        +'<span class="ap-rssi">'+bars+' '+ap.rssi+'dBm</span>';
      d.onclick=function(){document.getElementById('ssid').value=ap.ssid;};
      el.appendChild(d);
    });
  }).catch(()=>{el.innerHTML='<div class="scanning">жЙЂжППе§±иі•</div>';});
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;');}

function setMsg(txt,ok){
  var el=document.getElementById('msg');
  el.textContent=txt;
  el.style.color=ok?'#3fb950':'#f85149';
}

function doProvision(){
  var ssid=document.getElementById('ssid').value.trim();
  if(!ssid){setMsg('иѓЈиЊУеЕ• WiFi еРНзІ∞',false);return;}
  setMsg('ж≠£еЬ®дњЭе≠ШйЕНзљЃпЉМиѓЈз®НеАЩ...',true);

  var body='ssid='+encodeURIComponent(ssid)
    +'&pass='+encodeURIComponent(document.getElementById('pass').value)
    +'&ip_mode='+document.getElementById('ip_mode').value;
  if(document.getElementById('ip_mode').value==='1'){
    body+='&ip='+encodeURIComponent(document.getElementById('s_ip').value)
      +'&mask='+encodeURIComponent(document.getElementById('s_mask').value)
      +'&gw='+encodeURIComponent(document.getElementById('s_gw').value)
      +'&dns1='+encodeURIComponent(document.getElementById('s_dns1').value)
      +'&dns2='+encodeURIComponent(document.getElementById('s_dns2').value);
  }

  fetch('/api/prov',{method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body})
  .then(r=>r.json()).then(d=>{
    if(d.ok) setMsg('вЬУ йЕНзљЃеЈ≤дњЭе≠ШпЉБиЃЊе§Зж≠£еЬ®йЗНеРѓињЮжО• WiFi...', true);
    else     setMsg('вЬЧ '+(d.err||'е§±иі•'), false);
  }).catch(()=>setMsg('вЬУ йЕНзљЃеЈ≤дњЭе≠ШпЉБиЃЊе§Зж≠£еЬ®йЗНеРѓ...', true));
}
</script>
</body>
</html>
