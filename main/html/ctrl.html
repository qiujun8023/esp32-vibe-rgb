<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ESP32 Vibe RGB</title>
<link rel="stylesheet" href="/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%2322d3ee'/></svg>">
</head>
<body>
<div class="app">
  <!-- 头部 -->
  <header class="app-header">
    <h1>ESP32 Vibe RGB</h1>
    <div class="connection-status">
      <span class="status-indicator connecting" id="st-conn-indicator"></span>
      <span id="st-conn">连接中</span>
    </div>
  </header>

  <!-- 实时预览 -->
  <section class="preview-section">
    <div class="preview-container">
      <canvas id="matrix-canvas"></canvas>
    </div>
    <div class="preview-stats">
      <div class="stat-item">
        <span class="stat-label">帧率</span>
        <span class="stat-value" id="st-fps">-- fps</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">音量</span>
        <span class="stat-value" id="st-vol">--%</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">效果</span>
        <span class="stat-value" id="st-effect">--</span>
      </div>
    </div>
  </section>

  <!-- 标签导航 -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="effects">效果</button>
    <button class="tab-btn" data-tab="audio">音频</button>
    <button class="tab-btn" data-tab="led">灯光</button>
    <button class="tab-btn" data-tab="wifi">网络</button>
    <button class="tab-btn" data-tab="system">系统</button>
  </nav>

  <!-- 主内容 -->
  <main class="tab-content">
    <!-- 效果面板 -->
    <section id="tab-effects" class="tab-pane active">
      <div class="panel">
        <div class="panel-header">
          <h2>效果选择</h2>
        </div>
        <div class="panel-body">
          <div class="grid-4" id="fx-grid"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2>效果参数</h2>
        </div>
        <div class="panel-body">
          <div class="params-list">
            <div class="param-row">
              <label class="param-label">速度</label>
              <input type="range" class="param-slider" id="speed" min="0" max="255" value="128">
              <input type="number" class="param-value" id="speed_v" value="128" min="0" max="255">
            </div>
            <div class="param-row">
              <label class="param-label">强度</label>
              <input type="range" class="param-slider" id="intensity" min="0" max="255" value="128">
              <input type="number" class="param-value" id="intensity_v" value="128" min="0" max="255">
            </div>
            <div class="param-row" id="c1-row">
              <label class="param-label" id="c1-lbl">参数1</label>
              <input type="range" class="param-slider" id="custom1" min="0" max="255" value="128">
              <input type="number" class="param-value" id="custom1_v" value="128" min="0" max="255">
            </div>
            <div class="param-row" id="c2-row">
              <label class="param-label" id="c2-lbl">参数2</label>
              <input type="range" class="param-slider" id="custom2" min="0" max="255" value="128">
              <input type="number" class="param-value" id="custom2_v" value="128" min="0" max="255">
            </div>
            <div class="param-row" id="c3-row">
              <label class="param-label" id="c3-lbl">参数3</label>
              <input type="range" class="param-slider" id="custom3" min="0" max="255" value="128">
              <input type="number" class="param-value" id="custom3_v" value="128" min="0" max="255">
            </div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2>调色板</h2>
        </div>
        <div class="panel-body">
          <div class="grid-4" id="palette-grid"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2>频率方向</h2>
        </div>
        <div class="panel-body">
          <div class="btn-row-2">
            <button class="choice-btn active" id="dir0" data-value="0">
              <span class="choice-text">水平排列</span>
            </button>
            <button class="choice-btn" id="dir1" data-value="1">
              <span class="choice-text">垂直排列</span>
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- 音频面板 -->
    <section id="tab-audio" class="tab-pane">
      <div class="panel">
        <div class="panel-header">
          <h2>自动增益 (AGC)</h2>
        </div>
        <div class="panel-body">
          <div class="btn-row-3">
            <button class="choice-btn" id="agc0" data-value="0">
              <span class="choice-text">关闭</span>
            </button>
            <button class="choice-btn active" id="agc1" data-value="1">
              <span class="choice-text">普通</span>
            </button>
            <button class="choice-btn" id="agc2" data-value="2">
              <span class="choice-text">强力</span>
            </button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2>音频参数</h2>
        </div>
        <div class="panel-body">
          <div class="params-list">
            <div class="param-row">
              <label class="param-label">手动增益</label>
              <input type="range" class="param-slider" id="gain" min="1" max="200" value="40">
              <input type="number" class="param-value" id="gain_v" value="40" min="1" max="200">
            </div>
            <div class="param-row">
              <label class="param-label">噪声门限</label>
              <input type="range" class="param-slider" id="squelch" min="0" max="255" value="5">
              <input type="number" class="param-value" id="squelch_v" value="5" min="0" max="255">
            </div>
            <div class="param-row">
              <label class="param-label">FFT平滑</label>
              <input type="range" class="param-slider" id="fft_smooth" min="0" max="255" value="100">
              <input type="number" class="param-value" id="fft_smooth_v" value="100" min="0" max="255">
            </div>
          </div>
        </div>
      </div>

      <div class="panel panel-warning">
        <div class="panel-header">
          <h2>麦克风引脚</h2>
          <span class="panel-badge">需重启</span>
        </div>
        <div class="panel-body">
          <div class="fields-list">
            <div class="field-row">
              <label class="field-label" style="min-width: 80px;">WS (LRCK)</label>
              <input type="number" class="field-input" id="mic_ws" min="0" max="48" value="4" style="flex:1">
            </div>
            <div class="field-row">
              <label class="field-label" style="min-width: 80px;">SCK (BCLK)</label>
              <input type="number" class="field-input" id="mic_sck" min="0" max="48" value="5" style="flex:1">
            </div>
            <div class="field-row">
              <label class="field-label" style="min-width: 80px;">DIN (DATA)</label>
              <input type="number" class="field-input" id="mic_din" min="0" max="48" value="6" style="flex:1">
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- 灯光面板 -->
    <section id="tab-led" class="tab-pane">
      <div class="panel">
        <div class="panel-header">
          <h2>亮度控制</h2>
        </div>
        <div class="panel-body">
          <div class="params-list">
            <div class="param-row">
              <label class="param-label">全局亮度</label>
              <input type="range" class="param-slider" id="brightness" min="0" max="255" value="160">
              <input type="number" class="param-value" id="brightness_v" value="160" min="0" max="255">
            </div>
          </div>
        </div>
      </div>

      <div class="panel panel-warning">
        <div class="panel-header">
          <h2>矩阵配置</h2>
          <span class="panel-badge">需重启</span>
        </div>
        <div class="panel-body">
          <div class="fields-list">
            <div class="field-row">
              <label class="field-label" style="min-width: 50px;">GPIO</label>
              <input type="number" class="field-input" id="led_gpio" min="0" max="48" value="16" style="flex:1">
            </div>
            <div class="field-row">
              <label class="field-label" style="min-width: 50px;">宽度</label>
              <input type="number" class="field-input" id="led_w" min="1" max="32" value="8" style="flex:1">
            </div>
            <div class="field-row">
              <label class="field-label" style="min-width: 50px;">高度</label>
              <input type="number" class="field-input" id="led_h" min="1" max="32" value="8" style="flex:1">
            </div>
            <div class="field-row">
              <label class="field-label" style="min-width: 50px;">走线</label>
              <select class="field-select" id="led_serpentine" style="flex:1">
                <option value="1">蛇形</option>
                <option value="0">顺序</option>
              </select>
            </div>
            <div class="field-row">
              <label class="field-label" style="min-width: 50px;">起点</label>
              <select class="field-select" id="led_start" style="flex:1">
                <option value="0">左下</option>
                <option value="1">右下</option>
                <option value="2">左上</option>
                <option value="3">右上</option>
              </select>
            </div>
            <div class="field-row">
              <label class="field-label" style="min-width: 50px;">旋转</label>
              <select class="field-select" id="led_rotation" style="flex:1">
                <option value="0">0°</option>
                <option value="1">90°</option>
                <option value="2">180°</option>
                <option value="3">270°</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2>LED 布线预览</h2>
          <span class="panel-subtitle">显示像素序号</span>
        </div>
        <div class="panel-body">
          <div class="led-preview-wrap">
            <canvas id="led-preview"></canvas>
            <div class="preview-actions" style="width: 100%; display: flex; margin-top: 10px;">
              <button class="action-btn outline" onclick="testLedOrder()" id="btn-test" style="flex: 1;">测试接线顺序</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- 网络面板 -->
    <section id="tab-wifi" class="tab-pane">
      <div class="panel panel-warning">
        <div class="panel-header">
          <h2>WiFi 设置</h2>
          <span class="panel-badge">需重启</span>
        </div>
        <div class="panel-body">
          <div class="fields-list">
            <div class="field-row">
              <label class="field-label">名称</label>
              <input type="text" class="field-input" id="cfg_ssid" placeholder="SSID" style="flex:1">
            </div>
            <div class="field-row">
              <label class="field-label">密码</label>
              <input type="password" class="field-input" id="pass_new" placeholder="密码" style="flex:1">
            </div>
          </div>
        </div>
      </div>

      <div class="panel panel-warning">
        <div class="panel-header">
          <h2>IP 配置</h2>
          <span class="panel-badge">需重启</span>
        </div>
        <div class="panel-body">
          <div class="field-row">
            <label class="field-label">模式</label>
            <select class="field-select" id="ip_mode" style="flex:1">
              <option value="0">DHCP（自动）</option>
              <option value="1">静态 IP</option>
            </select>
          </div>
          <div class="fields-list collapsible" id="static-ip-fields">
            <div class="field-row">
              <label class="field-label">IP</label>
              <input type="text" class="field-input" id="s_ip" placeholder="192.168.1.100" style="flex:1">
            </div>
            <div class="field-row">
              <label class="field-label">子网</label>
              <input type="text" class="field-input" id="s_mask" placeholder="255.255.255.0" style="flex:1">
            </div>
            <div class="field-row">
              <label class="field-label">网关</label>
              <input type="text" class="field-input" id="s_gw" placeholder="192.168.1.1" style="flex:1">
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- 系统面板 -->
    <section id="tab-system" class="tab-pane">
      <div class="panel">
        <div class="panel-header">
          <h2>设备状态</h2>
        </div>
        <div class="panel-body">
          <div class="stats-grid-3">
            <div class="stat-box">
              <span class="stat-box-label">运行时间</span>
              <span class="stat-box-value" id="st-uptime">--:--:--</span>
            </div>
            <div class="stat-box">
              <span class="stat-box-label">内存</span>
              <span class="stat-box-value" id="st-heap">-- KB</span>
            </div>
            <div class="stat-box">
              <span class="stat-box-label">信号</span>
              <span class="stat-box-value" id="st-rssi">-- dBm</span>
            </div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2>操作</h2>
        </div>
        <div class="panel-body">
          <div class="actions-stack">
            <button class="action-btn primary large" onclick="saveAllSettings()">保存配置</button>
            <button class="action-btn warning large" onclick="doReboot()">重启设备</button>
            <button class="action-btn danger large" onclick="factoryReset()">恢复出厂设置</button>
          </div>
        </div>
      </div>

      <div class="toast" id="sys-msg"></div>
    </section>
  </main>
</div>
<script src="/ctrl.js"></script>
</body>
</html>
