<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ESP32-Vibe-RGB</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="container">
  <div class="header">ESP32-Vibe-RGB</div>

  <!-- 矩阵实时预览 -->
  <div class="card preview-card">
    <div id="matrix-wrap"><canvas id="matrix-canvas"></canvas></div>
    <div class="status-bar">
      <span id="st-conn" class="status-dot connecting">连接中</span>
      <span id="st-fps">-- fps</span>
      <span id="st-vol">音量 --%</span>
      <span id="st-effect">-</span>
    </div>
  </div>

  <!-- 标签页 -->
  <div class="tabs">
    <div class="tab active" data-tab="effects">效果</div>
    <div class="tab" data-tab="audio">音频</div>
    <div class="tab" data-tab="led">灯光</div>
    <div class="tab" data-tab="wifi">网络</div>
    <div class="tab" data-tab="system">系统</div>
  </div>

  <!-- 效果标签 -->
  <div id="tab-effects" class="tab-pane active">
    <div class="card">
      <div class="card-title">效果选择</div>
      <div id="fx-grid" class="fx-grid"></div>
    </div>
    <div class="card">
      <div class="card-title">效果参数</div>
      <div class="slider-row"><label>速度</label>
        <input type="range" id="speed" min="0" max="255">
        <span id="speed_v" class="val-display" data-key="speed">128</span></div>
      <div class="slider-row"><label>强度</label>
        <input type="range" id="intensity" min="0" max="255">
        <span id="intensity_v" class="val-display" data-key="intensity">128</span></div>
      <div class="slider-row" id="c1-row"><label id="c1-lbl">参数1</label>
        <input type="range" id="custom1" min="0" max="255">
        <span id="custom1_v" class="val-display" data-key="custom1">128</span></div>
      <div class="slider-row" id="c2-row"><label id="c2-lbl">参数2</label>
        <input type="range" id="custom2" min="0" max="255">
        <span id="custom2_v" class="val-display" data-key="custom2">128</span></div>
      <div class="slider-row" id="c3-row"><label id="c3-lbl">参数3</label>
        <input type="range" id="custom3" min="0" max="255">
        <span id="custom3_v" class="val-display" data-key="custom3">128</span></div>
    </div>
    <div class="card">
      <div class="card-title">调色板</div>
      <div id="palette-grid" class="fx-grid"></div>
    </div>
    <div class="card">
      <div class="card-title">频率方向</div>
      <div class="btn-group">
        <button id="dir0" class="btn toggle active" data-value="0">左低右高</button>
        <button id="dir1" class="btn toggle" data-value="1">下低上高</button>
      </div>
    </div>
  </div>

  <!-- 音频标签 -->
  <div id="tab-audio" class="tab-pane">
    <div class="card">
      <div class="card-title">自动增益 (AGC)</div>
      <div class="btn-group">
        <button id="agc0" class="btn toggle" data-value="0">关闭</button>
        <button id="agc1" class="btn toggle active" data-value="1">普通</button>
        <button id="agc2" class="btn toggle" data-value="2">强力</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">音频参数</div>
      <div class="slider-row"><label>手动增益</label>
        <input type="range" id="gain" min="1" max="200">
        <span id="gain_v" class="val-display" data-key="gain" data-min="1" data-max="200">40</span></div>
      <div class="slider-row"><label>噪声门限</label>
        <input type="range" id="squelch" min="0" max="255">
        <span id="squelch_v" class="val-display" data-key="squelch">5</span></div>
      <div class="slider-row"><label>FFT平滑</label>
        <input type="range" id="fft_smooth" min="0" max="255">
        <span id="fft_smooth_v" class="val-display" data-key="fft_smooth">100</span></div>
    </div>
    <div class="card">
      <div class="card-title">麦克风引脚 <span class="hint">修改后需重启</span></div>
      <div class="field-row"><label>WS (LRCK)</label><input type="number" id="mic_ws" min="0" max="48"></div>
      <div class="field-row"><label>SCK (BCLK)</label><input type="number" id="mic_sck" min="0" max="48"></div>
      <div class="field-row"><label>DIN (DATA)</label><input type="number" id="mic_din" min="0" max="48"></div>
    </div>
  </div>

  <!-- 灯光标签 -->
  <div id="tab-led" class="tab-pane">
    <div class="card">
      <div class="card-title">亮度控制</div>
      <div class="slider-row"><label>全局亮度</label>
        <input type="range" id="brightness" min="0" max="255">
        <span id="brightness_v" class="val-display" data-key="brightness">160</span></div>
    </div>
    <div class="card">
      <div class="card-title">矩阵配置 <span class="hint">修改后需重启</span></div>
      <div class="field-row"><label>数据引脚 GPIO</label><input type="number" id="led_gpio" min="0" max="48"></div>
      <div class="field-row"><label>矩阵宽度</label><input type="number" id="led_w" min="1" max="32"></div>
      <div class="field-row"><label>矩阵高度</label><input type="number" id="led_h" min="1" max="32"></div>
      <div class="field-row"><label>走线方式</label>
        <select id="led_serpentine">
          <option value="1">蛇形（锯齿）</option>
          <option value="0">顺序</option>
        </select></div>
      <div class="field-row"><label>起始角</label>
        <select id="led_start">
          <option value="0">左下</option>
          <option value="1">右下</option>
          <option value="2">左上</option>
          <option value="3">右上</option>
        </select></div>
      <div class="field-row"><label>旋转方向</label>
        <select id="led_rotation">
          <option value="0">0°（不旋转）</option>
          <option value="1">90°（顺时针）</option>
          <option value="2">180°</option>
          <option value="3">270°（顺时针）</option>
        </select></div>
    </div>
    <div class="card">
      <div class="card-title">LED编号预览</div>
      <div class="led-preview-wrap"><canvas id="led-preview"></canvas></div>
      <p class="hint center">数字为LED索引，红线为数据流向</p>
      <div class="center">
        <button class="btn primary" onclick="testLedOrder()">测试硬件布线</button>
      </div>
      <p class="hint center">LED将按索引顺序依次点亮红色</p>
    </div>
  </div>

  <!-- 网络标签 -->
  <div id="tab-wifi" class="tab-pane">
    <div class="card">
      <div class="card-title">WiFi配置 <span class="hint">修改后需重启</span></div>
      <div class="field-row"><label>网络名称</label><input type="text" id="cfg_ssid" autocomplete="off"></div>
      <div class="field-row"><label>密码</label><input type="password" id="pass_new" autocomplete="new-password" placeholder="留空不修改"></div>
    </div>
    <div class="card">
      <div class="card-title">IP配置</div>
      <div class="field-row"><label>分配方式</label>
        <select id="ip_mode">
          <option value="0">DHCP（自动）</option>
          <option value="1">静态IP</option>
        </select></div>
      <div id="static-ip-fields">
        <div class="field-row"><label>IP地址</label><input type="text" id="s_ip"></div>
        <div class="field-row"><label>子网掩码</label><input type="text" id="s_mask"></div>
        <div class="field-row"><label>网关</label><input type="text" id="s_gw"></div>
        <div class="field-row"><label>DNS主</label><input type="text" id="s_dns1"></div>
        <div class="field-row"><label>DNS备</label><input type="text" id="s_dns2"></div>
      </div>
    </div>
  </div>

  <!-- 系统标签 -->
  <div id="tab-system" class="tab-pane">
    <div class="card">
      <div class="card-title">配置管理</div>
      <div class="btn-stack">
        <button class="btn primary large" onclick="saveAllSettings()">保存配置</button>
        <button class="btn large" onclick="doReboot()">重启设备</button>
      </div>
      <p class="hint">效果、亮度、音频参数修改后自动保存。<br>GPIO、WiFi、矩阵设置保存后需重启生效。</p>
    </div>
    <div class="card danger-zone">
      <div class="card-title">危险操作</div>
      <div class="btn-stack">
        <button class="btn danger" onclick="resetWifi()">重置WiFi</button>
        <button class="btn danger" onclick="factoryReset()">恢复出厂</button>
      </div>
    </div>
    <div id="sys-msg" class="sys-msg"></div>
  </div>

</div>
<script src="/ctrl.js"></script>
</body>
</html>
